<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <title>Document</title>
  </head>

  <body>
    <header
      class="py-1.5 sm:py-4 fixed top-0 inset-x-0 sm:static z-10 bg-white border-b sm:border-0 dark:border-0 dark:bg-gray-900"
    >
      <div class="container flex items-center justify-between gap-x-10">
        <a href="#" class="flex items-center gap-x-1 sm:gap-x-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="text-indigo-600 size-8 sm:size-12 -rotate-6 dark:text-white"
          >
            <path
              fill-rule="evenodd"
              d="M3 6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6Zm14.25 6a.75.75 0 0 1-.22.53l-2.25 2.25a.75.75 0 1 1-1.06-1.06L15.44 12l-1.72-1.72a.75.75 0 1 1 1.06-1.06l2.25 2.25c.141.14.22.331.22.53Zm-10.28-.53a.75.75 0 0 0 0 1.06l2.25 2.25a.75.75 0 1 0 1.06-1.06L8.56 12l1.72-1.72a.75.75 0 1 0-1.06-1.06l-2.25 2.25Z"
              clip-rule="evenodd"
            />
          </svg>
          <span class="text-xl font-black sm:text-2xl dark:text-white"
            >Code Editor</span
          >
        </a>
        <nav class="hidden sm:block grow">
          <ul class="flex items-center gap-x-8">
            <li class="mr-auto">
              <a
                href="#"
                class="font-semibold hover:text-indigo-600 dark:text-gray-200 dark:hover:text-indigo-200"
              >
                Library
              </a>
            </li>
            <li>
              <a
                href="login.html"
                class="font-semibold hover:text-indigo-600 dark:text-gray-200 dark:hover:text-indigo-200"
              >
                Log In
              </a>
            </li>
            <li>
              <a
                href="register.html"
                class="px-3 py-2 font-semibold bg-indigo-600 rounded-md text-indigo-50 hover:bg-indigo-700"
              >
                Sign Up
              </a>
            </li>
          </ul>
        </nav>
        <div class="flex sm:hidden">
          <nav
            id="nav"
            class="absolute inset-x-0 hidden bg-white border-b dark:bg-gray-900 dark:border-0 peer target:block top-full"
          >
            <ul
              class="inset-x-0 top-0 flex flex-col items-center px-3 pb-3 gap-y-2"
            >
              <li class="flex w-full">
                <a
                  href="#"
                  class="w-full p-2 text-sm font-semibold text-center rounded-md sm:text-base hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-gray-700"
                >
                  Library
                </a>
              </li>
              <li class="flex w-full">
                <a
                  href="#"
                  class="w-full p-2 text-sm font-semibold text-center rounded-md sm:text-base hover:bg-gray-100 dark:text-gray-200 dark:hover:bg-gray-700"
                >
                  Log In
                </a>
              </li>
              <li class="flex w-full">
                <a
                  href="#"
                  class="w-full px-3 py-2 text-sm font-semibold text-center bg-indigo-600 rounded-md sm:text-base text-indigo-50 hover:bg-indigo-700"
                >
                  Sign Up
                </a>
              </li>
            </ul>
          </nav>
          <a
            href="#nav"
            class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md -mr-1.5 peer-target:hidden peer-target:[&+a]:block"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="size-6 dark:text-white"
            >
              <path
                fill-rule="evenodd"
                d="M3 6.75A.75.75 0 0 1 3.75 6h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 6.75ZM3 12a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 12Zm0 5.25a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z"
                clip-rule="evenodd"
              />
            </svg>
          </a>
          <a
            href="#"
            class="p-2 hidden target:block hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md -mr-1.5"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="size-6 dark:text-white"
            >
              <path
                fill-rule="evenodd"
                d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z"
                clip-rule="evenodd"
              />
            </svg>
          </a>
        </div>
      </div>
    </header>
  </body>
</html>
